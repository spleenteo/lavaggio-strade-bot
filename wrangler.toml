name = "lavaggio-strade-bot"
main = "src/worker.js"
account_id = "1ed0bcbfc2f1e696c278f37de34d8ef2"
compatibility_date = "2024-11-01"

# Variabile pubblica (non segreta). Distanza massima per considerare una via
# "quella giusta" rispetto alla posizione condivisa.
[vars]
MATCH_THRESHOLD_M = "60"

# Namespace KV dove sta il file dati "pre-digerito".
# Sostituisci <KV_ID> con l'id che ottieni da:
#   npx wrangler kv namespace create STREETS_KV
[[kv_namespaces]]
binding = "STREETS_KV"
id = "a33620a340fd403f98fe703076e876d3"

# I SEGRETI (BOT_TOKEN, WEBHOOK_SECRET) NON vanno qui: si impostano con
#   npx wrangler secret put BOT_TOKEN
#   npx wrangler secret put WEBHOOK_SECRET
